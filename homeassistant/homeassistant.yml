services:

  homeassistant:
    container_name: homeassistant
    restart: unless-stopped
    image: homeassistant/home-assistant
    network_mode: host
    dns_search: viama.co.uk
    volumes:
      - /var/data/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/London
    labels:
      - "traefik.enable=false"
      - "dockflare.enable=true"
      - "dockflare.hostname=hass.viama.co.uk"
      - "dockflare.service=http://dockervm.viama.co.uk:8123"
      - "dockflare.zonename=viama.co.uk"
      - "dockflare.access.groups=home-ip-bypass,google-auth"
      - "dockflare.access.app_launcher_visible=true"

  ha-mcp:
    container_name: ha-mcp
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    restart: unless-stopped
    network_mode: host
    command: ha-mcp-web
    environment:
      - HOMEASSISTANT_URL=http://localhost:8123
    env_file:
      - ha-mcp.env
    labels:
      - "traefik.enable=false"

